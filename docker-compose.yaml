version: '3.8'

services:
  n8n:
    image: n8nio/n8n:2.16.1
    container_name: n8n
    mem_limit: "3g"
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    labels: 
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`${APP_URL}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=http"
      - "traefik.http.services.n8n.loadbalancer.server.port=${APP_PORT}"
      - "traefik.http.routers.n8n.middlewares=https-redirect@file"
      - "traefik.docker.network=proxy"

volumes:
  n8n_data:

networks:
  proxy:
    external: true